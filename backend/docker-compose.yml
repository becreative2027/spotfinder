version: '3.8'

services:
  auth-service:
    build:
      context: ./SpotFinder.AuthService
      dockerfile: SpotFinder.AuthService.API/Dockerfile
    container_name: spotfinder-auth-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
